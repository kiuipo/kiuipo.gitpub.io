<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>ขอเป็นแฟนงับงื้อๆ</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #ffd6e8, #d9fbe5);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            width: 360px;
            background: #ffffffcc;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
        }
        /* ===== หน้ารหัส ===== */
        
        .password {
            font-size: 26px;
            letter-spacing: 8px;
            border-bottom: 2px solid #ff6fae;
            width: 150px;
            margin: 10px auto;
            color: #ff6fae;
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .keypad button {
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            background: #ffd6e8;
            cursor: pointer;
        }
        /* ===== หน้าเป็นแฟน ===== */
        
        .love-screen {
            display: none;
        }
        
        .buttons {
            position: relative;
            height: 120px;
        }
        
        .yes {
            background: #8be3c6;
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
        }
        
        .no {
            background: #ffc1da;
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            position: absolute;
            left: 150px;
            top: 50px;
        }
        /* ===== ซองจดหมาย ===== */
        
        .envelope-screen {
            display: none;
        }
        
        .envelope {
            width: 200px;
            height: 130px;
            background: #ffb6d5;
            position: relative;
            margin: auto;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
        }
        
        .envelope::before {
            content: "";
            position: absolute;
            inset: 0;
            background: #ff6fae;
            clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 0 100%);
        }
        
        .envelope.open::before {
            animation: openEnv 1s forwards;
        }
        
        @keyframes openEnv {
            to {
                transform: translateY(-100%);
            }
        }
        /* ===== ข้อความในซอง ===== */
        
        .letter {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #fff;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 16px;
            opacity: 0;
            transition: all .6s ease;
        }
        
        .envelope.open .letter {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        /* ===== หัวใจ ===== */
        
        .heart {
            position: fixed;
            bottom: -20px;
            font-size: 24px;
            animation: floatUp 4s linear forwards;
        }
        
        @keyframes floatUp {
            to {
                transform: translateY(-120vh);
                opacity: 0;
            }
        }
        /* ===== รูปลอย ===== */
        
        .float-img {
            position: fixed;
            bottom: -120px;
            width: 80px;
            animation: floatUp 6s linear forwards;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- หน้ารหัส -->
        <div id="lockScreen">
            <h2>ใส่รหัสลับ 💗</h2>
            <div class="password" id="passwordDisplay">____</div>

            <div class="keypad">
                <button onclick="pressNum(1)">1</button>
                <button onclick="pressNum(2)">2</button>
                <button onclick="pressNum(3)">3</button>
                <button onclick="pressNum(4)">4</button>
                <button onclick="pressNum(5)">5</button>
                <button onclick="pressNum(6)">6</button>
                <button onclick="pressNum(7)">7</button>
                <button onclick="pressNum(8)">8</button>
                <button onclick="pressNum(9)">9</button>
                <button onclick="clearPass()">⌫</button>
                <button onclick="pressNum(0)">0</button>
                <button onclick="checkPass()">✔</button>
            </div>
        </div>

        <!-- หน้าเป็นแฟน -->
        <div class="love-screen" id="loveScreen">
            <h3>ขอเป็นแฟนได้ไหม 💕</h3>
            <div class="buttons">
                <button class="yes" onclick="acceptLove()">เป็น 💖</button>
                <button class="no" id="noBtn" onclick="moveNo()">ไม่เป็น 😳</button>
            </div>
            <div id="cuteText"></div>
        </div>

        <!-- ซองจดหมาย -->
        <div class="envelope-screen" id="envelopeScreen">
            <h3>กดซองจดหมายสิ 💌</h3>
            <div class="envelope" id="envelope" onclick="openEnvelope()">
                <div class="letter">น่ารักจังงับอ้วง งื้อๆ 💕</div>
            </div>
        </div>

    </div>

    <audio id="bgm" src="202602162325.mp4" loop></audio>

    <script>
        const lockScreen = document.getElementById("lockScreen");
        const loveScreen = document.getElementById("loveScreen");
        const envelopeScreen = document.getElementById("envelopeScreen");
        const envelope = document.getElementById("envelope");
        const passwordDisplay = document.getElementById("passwordDisplay");
        const noBtn = document.getElementById("noBtn");
        const cuteText = document.getElementById("cuteText");
        const bgm = document.getElementById("bgm");

        const correctPassword = "2407";
        let input = "";
        let opened = false;

        const floatImages = [
            "picture/01.jpg",
            "picture/02.jpg",
            "picture/03.jpg",
            "picture/04.jpg",
            "picture/05.jpg"
        ];

        const cuteMessages = [
            "งื้ออ ใจร้าย",
            "ปุ่มนี้กดยากนะ",
            "เขิลลล",
            "หนีเก่งมาก",
            "ลองกดเป็นสิ 💕"
        ];

        function pressNum(n) {
            if (input.length < 4) {
                input += n;
                passwordDisplay.textContent = input.padEnd(4, "_");
            }
        }

        function clearPass() {
            input = input.slice(0, -1);
            passwordDisplay.textContent = input.padEnd(4, "_");
        }

        function checkPass() {
            if (input === correctPassword) {
                lockScreen.style.display = "none";
                loveScreen.style.display = "block";
            } else {
                alert("รหัสไม่ถูกนะงับ");
                input = "";
                passwordDisplay.textContent = "____";
            }
        }

        function moveNo() {
            noBtn.style.left = Math.random() * 200 + "px";
            noBtn.style.top = Math.random() * 80 + "px";
            cuteText.textContent =
                cuteMessages[Math.floor(Math.random() * cuteMessages.length)];
        }

        function acceptLove() {
            loveScreen.style.display = "none";
            envelopeScreen.style.display = "block";

            // 🎵 เพลงค่อยๆดัง
            bgm.volume = 0;
            bgm.play();
            fadeInMusic();

            // 💖 หัวใจ + รูปลอย (สุ่ม วนไปเรื่อยๆ)
            setInterval(spawnHeart, 300);
            setInterval(spawnFloatImage, 900);
        }

        function fadeInMusic() {
            let v = 0;
            const fade = setInterval(() => {
                v += 0.02;
                bgm.volume = Math.min(v, 1);
                if (v >= 1) clearInterval(fade);
            }, 200);
        }

        function openEnvelope() {
            if (opened) return;
            opened = true;
            envelope.classList.add("open");
        }

        function spawnHeart() {
            const h = document.createElement("div");
            h.className = "heart";
            h.textContent = "💖";
            h.style.left = Math.random() * 100 + "vw";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }

        function spawnFloatImage() {
            const img = document.createElement("img");
            img.className = "float-img";

            // 🔀 สุ่มรูปทุกครั้ง
            const randomIndex = Math.floor(Math.random() * floatImages.length);
            img.src = floatImages[randomIndex];

            img.style.left = Math.random() * 80 + "vw";
            document.body.appendChild(img);
            setTimeout(() => img.remove(), 6000);
        }
    </script>

</body>

</html>
